<!DOCTYPE html>
<html><head><style>
html { background: #FFFFFF; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; }
.header { background: #1B2631; padding: 18pt 40pt; }
.header h1 { color: #FFFFFF; font-size: 22pt; margin: 0; }
.header .accent { width: 50pt; height: 3pt; background: #0D7377; margin: 6pt 0 0 0; }
.content { display: flex; flex: 1; padding: 12pt 40pt; gap: 15pt; }
.left { flex: 1.2; }
.left h2 { color: #0D7377; font-size: 14pt; margin: 0 0 6pt 0; }
.model { display: flex; align-items: center; gap: 8pt; margin: 5pt 0; }
.model-box { border-radius: 6pt; padding: 7pt 10pt; flex: 1; }
.m1 { background: #FDEDEC; border-left: 3pt solid #E74C3C; }
.m2 { background: #FEF9E7; border-left: 3pt solid #F39C12; }
.m3 { background: #E8F8F5; border-left: 3pt solid #27AE60; }
.m4 { background: #0D7377; }
.model-box h3 { color: #1B2631; font-size: 10pt; margin: 0; }
.m4 h3 { color: #FFFFFF; }
.model-box p { color: #34495E; font-size: 8pt; margin: 1pt 0; }
.m4 p { color: #D5F5E3; }
.mult { color: #34495E; font-size: 8pt; margin: 0; min-width: 40pt; text-align: center; font-weight: bold; }
.right { flex: 0.8; }
.right h2 { color: #1B2631; font-size: 14pt; margin: 0 0 6pt 0; }
.adv { display: flex; gap: 6pt; margin: 5pt 0; }
.adv-h { background: #0D7377; border-radius: 4pt; padding: 5pt 8pt; flex: 1; }
.adv-a { background: #34495E; border-radius: 4pt; padding: 5pt 8pt; flex: 1; }
.adv-h h3, .adv-a h3 { color: #FFFFFF; font-size: 9pt; margin: 0 0 2pt 0; }
.adv-h p, .adv-a p { color: #D5F5E3; font-size: 8pt; margin: 1pt 0; }
.principle { background: #F8F9FA; border: 2pt solid #0D7377; border-radius: 6pt; padding: 8pt 12pt; margin: 6pt 0 0 0; text-align: center; }
.principle p { color: #0D7377; font-size: 11pt; margin: 0; font-weight: bold; }
</style></head><body>
<div class="header">
  <h1>组织中人与 AI 的关系</h1>
  <div class="accent"></div>
</div>
<div class="content">
  <div class="left">
    <h2>四种关系模型</h2>
    <div class="model">
      <div class="model-box m1">
        <h3>替代模型</h3>
        <p>AI 取代人做同样的事</p>
      </div>
      <p class="mult">抵制</p>
    </div>
    <div class="model">
      <div class="model-box m2">
        <h3>工具模型</h3>
        <p>AI 是更好的工具，人用 AI 做事</p>
      </div>
      <p class="mult">有限提效</p>
    </div>
    <div class="model">
      <div class="model-box m3">
        <h3>协作模型</h3>
        <p>人和 AI 各做擅长的事，流程重设计</p>
      </div>
      <p class="mult">5-10x</p>
    </div>
    <div class="model">
      <div class="model-box m4">
        <h3>共生模型</h3>
        <p>组织围绕人 AI 协作重新构建</p>
      </div>
      <p class="mult">10-100x</p>
    </div>
  </div>
  <div class="right">
    <h2>各自优势</h2>
    <div class="adv">
      <div class="adv-h">
        <h3>人更强</h3>
        <p>模糊判断 / 直觉</p>
        <p>跨领域创新</p>
        <p>信任 / 谈判</p>
        <p>理解"为什么"</p>
        <p>承担责任</p>
      </div>
      <div class="adv-a">
        <h3>AI 更强</h3>
        <p>精确规则执行</p>
        <p>已知模式变换</p>
        <p>高频信息处理</p>
        <p>海量"是什么"</p>
        <p>7x24 不疲劳</p>
      </div>
    </div>
    <div class="principle">
      <p>人做决策，AI 做执行</p>
      <p>人负责任，AI 提供能力</p>
    </div>
  </div>
</div>
</body></html>
