name: Docs Publish

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/docs-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build static site
        run: node scripts/build-site.mjs
      - name: Verify generated site is publish-safe
        run: |
          test ! -e site/.DS_Store
          ! find site -name '*.map' -print -quit | grep .
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
