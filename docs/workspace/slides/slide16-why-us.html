<!DOCTYPE html>
<html><head><style>
html { background: #FFFFFF; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; }
.header { background: #1B2631; padding: 18pt 40pt; }
.header h1 { color: #FFFFFF; font-size: 22pt; margin: 0; }
.header .accent { width: 50pt; height: 3pt; background: #F39C12; margin: 6pt 0 0 0; }
.content { flex: 1; padding: 12pt 40pt; }
.row { display: flex; border-bottom: 1pt solid #ECF0F1; }
.row-h { background: #1B2631; }
.cell { flex: 1; padding: 8pt 12pt; }
.cell-dim { flex: 0.7; }
.row-h .cell p { color: #FFFFFF; font-size: 10pt; font-weight: bold; margin: 0; }
.cell p { color: #34495E; font-size: 9pt; margin: 0; line-height: 1.3; }
.cell .red { color: #E74C3C; }
.cell .green { color: #0D7377; font-weight: bold; }
.row-alt { background: #F8F9FA; }
</style></head><body>
<div class="header">
  <h1>为什么选 RLL + Margay？</h1>
  <div class="accent"></div>
</div>
<div class="content">
  <div class="table">
    <div class="row row-h">
      <div class="cell cell-dim"><p>维度</p></div>
      <div class="cell"><p>传统 AI 辅助</p></div>
      <div class="cell"><p>RLL + Margay</p></div>
    </div>
    <div class="row">
      <div class="cell cell-dim"><p><b>人 AI 关系</b></p></div>
      <div class="cell"><p><span class="red">AI 做、人看（事后兜底）</span></p></div>
      <div class="cell"><p><span class="green">人 AI 交替协作，人做决策</span></p></div>
    </div>
    <div class="row row-alt">
      <div class="cell cell-dim"><p><b>代码质量</b></p></div>
      <div class="cell"><p><span class="red">AI 写完直接用</span></p></div>
      <div class="cell"><p><span class="green">双 AI 对抗性 Review，阻塞式门禁</span></p></div>
    </div>
    <div class="row">
      <div class="cell cell-dim"><p><b>知识管理</b></p></div>
      <div class="cell"><p><span class="red">RAG 向量库（检索片段）</span></p></div>
      <div class="cell"><p><span class="green">Markdown + Git，可追溯可协作</span></p></div>
    </div>
    <div class="row row-alt">
      <div class="cell cell-dim"><p><b>测试</b></p></div>
      <div class="cell"><p><span class="red">生成"伪覆盖"测试</span></p></div>
      <div class="cell"><p><span class="green">状态矩阵，关键路径必覆盖</span></p></div>
    </div>
    <div class="row">
      <div class="cell cell-dim"><p><b>上下文</b></p></div>
      <div class="cell"><p><span class="red">一次性对话</span></p></div>
      <div class="cell"><p><span class="green">40+ 轮持久化上下文</span></p></div>
    </div>
    <div class="row row-alt">
      <div class="cell cell-dim"><p><b>安全</b></p></div>
      <div class="cell"><p><span class="red">人工审查</span></p></div>
      <div class="cell"><p><span class="green">分层防御 + 纵深控制 + 审计内置</span></p></div>
    </div>
    <div class="row">
      <div class="cell cell-dim"><p><b>落地路径</b></p></div>
      <div class="cell"><p><span class="red">大规模推广，铺而不深</span></p></div>
      <div class="cell"><p><span class="green">小团队切入，扩充战果</span></p></div>
    </div>
  </div>
</div>
</body></html>
